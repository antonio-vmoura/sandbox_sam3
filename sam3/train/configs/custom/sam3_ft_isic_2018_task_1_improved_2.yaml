# @package _global_
defaults:
  - _self_

# ============================================================================
# SAM3 fine-tuning — ISIC 2018 Task 1 (lesion segmentation, binário, 1 classe)
# Revisão e melhorias sobre a versão original.
#
# Principais mudanças (veja também o relatório que acompanha este arquivo):
#   * Corrigido YAML inválido em `target_epoch_size` (estava como string).
#   * Removidas variáveis mortas (ex.: `max_data_epochs` sem referência).
#   * AMP reativado com bfloat16 (estável, sem NaN); se estiver em V100 mude
#     para False ou amp_dtype: float16 + inicie com lr menor.
#   * Augmentations adicionadas (HFlip, ColorJitter, RandomGrayscale) —
#     cruciais para dermatoscopia.
#   * Épocas reduzidas (100 -> 40) e scheduler ajustado (fine-tune converge
#     rápido em 2594 imagens).
#   * max_ann_per_img reduzido para 10 (ISIC Task 1 tem 1 lesão por imagem).
#   * skip_first_val: False — permite ver o baseline antes de treinar.
#   * val_epoch_freq reduzido para 2.
#   * save_freq aumentado para 10 para reduzir uso de disco.
#   * Comentários inconsistentes do original (“alteramos para False…”) foram
#     resolvidos; aqui o valor reflete a intenção real.
# ============================================================================

# ============================================================================
# Docker Command (referência)
# ============================================================================
# docker run --gpus all -it --rm \
#   --ipc=host \
#   --user $(id -u):$(id -g) \
#   -e HUGGING_FACE_HUB_TOKEN= \
#   -e HF_HOME=/workspace/cache/huggingface \
#   -e TORCH_HOME=/workspace/cache/torch \
#   -e HOME=/workspace/cache \
#   -v $(pwd)/datasets/isic_2018_task1_coco:/workspace/data \
#   -v $(pwd)/logs:/workspace/logs \
#   -v $(pwd)/sam3:/workspace/sam3 \
#   -v $(pwd)/configs:/workspace/configs \
#   -v $(pwd)/sam3_cache:/workspace/cache \
#   -v /etc/passwd:/etc/passwd:ro \
#   -v /etc/group:/etc/group:ro \
#   sam3_ft \
#   python sam3/train/train.py \
#       -c configs/custom/sam3_ft_isic_2018_task_1.yaml --use-cluster 0 \
#       2>&1 | tee logs/sam3_ft_isic_2018_task_1.log
# Obs.: não definimos PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True pois
#       causa problema na máquina 01. Se ocorrer OOM, prefira baixar o batch
#       para 1 e aumentar gradient_accumulation_steps para 2 ou 4.

# ============================================================================
# Paths
# ============================================================================
paths:
  root_dir: /workspace
  dataset_path: ${paths.root_dir}/data
  experiment_log_dir: ${paths.root_dir}/logs/sam3_ft_isic_2018_task_1_2
  bpe_path: ${paths.root_dir}/sam3/assets/bpe_simple_vocab_16e6.txt.gz

# ============================================================================
# Dataset config (mantém o namespace `roboflow_train` para compatibilidade
# com o trainer pré-existente, mas trata-se de ISIC 2018 Task 1)
# ============================================================================
roboflow_train:
  num_images: null  # null = usa todas as imagens

  # ---------------------------------------------------------------------------
  # Train transforms
  # ---------------------------------------------------------------------------
  train_transforms:
    - _target_: sam3.train.transforms.basic_for_api.ComposeAPI
      transforms:
        # 1) higiene de queries
        - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
          query_filter:
            _target_: sam3.train.transforms.filter_query_transforms.FilterCrowds

        # 2) decodifica RLE ANTES de qualquer coisa que dependa da máscara
        - _target_: sam3.train.transforms.segmentation.DecodeRle

        # 3) perturba o input_bbox p/ robustez (ISIC tem 1 lesão centralizada)
        - _target_: sam3.train.transforms.point_sampling.RandomizeInputBbox
          box_noise_std: 0.1
          box_noise_max: 20

        # 4) resize multi-escala + pad para quadrado na resolução alvo
        - _target_: sam3.train.transforms.basic_for_api.RandomResizeAPI
          sizes:
            _target_: sam3.train.transforms.basic.get_random_resize_scales
            size: ${scratch.resolution}
            min_size: 480
            rounded: false
          max_size:
            _target_: sam3.train.transforms.basic.get_random_resize_max_size
            size: ${scratch.resolution}
          square: true
          consistent_transform: ${scratch.consistent_transform}
        - _target_: sam3.train.transforms.basic_for_api.PadToSizeAPI
          size: ${scratch.resolution}
          consistent_transform: ${scratch.consistent_transform}

        # 5) augmentations específicas de dermatoscopia — PIL domain (antes do
        #    ToTensor). HFlip/VFlip não existe; só HFlip está disponível.
        - _target_: sam3.train.transforms.basic_for_api.RandomHorizontalFlip
          consistent_transform: ${scratch.consistent_transform}
          p: 0.5
        - _target_: sam3.train.transforms.basic_for_api.ColorJitter
          consistent_transform: ${scratch.consistent_transform}
          brightness: 0.2
          contrast: 0.2
          saturation: 0.2
          hue: 0.02
        - _target_: sam3.train.transforms.basic_for_api.RandomGrayscale
          consistent_transform: ${scratch.consistent_transform}
          p: 0.05

        # 6) tensor + filtros de query + normalização
        - _target_: sam3.train.transforms.basic_for_api.ToTensorAPI
        - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
          query_filter:
            _target_: sam3.train.transforms.filter_query_transforms.FilterEmptyTargets
        - _target_: sam3.train.transforms.basic_for_api.NormalizeAPI
          mean: ${scratch.train_norm_mean}
          std: ${scratch.train_norm_std}
        - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
          query_filter:
            _target_: sam3.train.transforms.filter_query_transforms.FilterEmptyTargets

    # Filtro final de queries com muitos objetos (teto = max_ann_per_img)
    - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
      query_filter:
        _target_: sam3.train.transforms.filter_query_transforms.FilterFindQueriesWithTooManyOut
        max_num_objects: ${scratch.max_ann_per_img}

  # ---------------------------------------------------------------------------
  # Val transforms (sem augmentations, determinístico)
  # ---------------------------------------------------------------------------
  val_transforms:
    - _target_: sam3.train.transforms.basic_for_api.ComposeAPI
      transforms:
        - _target_: sam3.train.transforms.segmentation.DecodeRle
        - _target_: sam3.train.transforms.basic_for_api.RandomResizeAPI
          sizes: ${scratch.resolution}
          max_size:
            _target_: sam3.train.transforms.basic.get_random_resize_max_size
            size: ${scratch.resolution}
          square: true
          consistent_transform: False
        - _target_: sam3.train.transforms.basic_for_api.PadToSizeAPI
          size: ${scratch.resolution}
          consistent_transform: False
        - _target_: sam3.train.transforms.basic_for_api.ToTensorAPI
        - _target_: sam3.train.transforms.basic_for_api.NormalizeAPI
          mean: ${scratch.val_norm_mean}
          std: ${scratch.val_norm_std}

  # ---------------------------------------------------------------------------
  # Loss para segmentação (instance head + semantic seg head)
  # ---------------------------------------------------------------------------
  loss:
    _target_: sam3.train.loss.sam3_loss.Sam3LossWrapper
    matcher: ${scratch.matcher}
    o2m_weight: 2.0
    o2m_matcher:
      _target_: sam3.train.matcher.BinaryOneToManyMatcher
      alpha: 0.3
      threshold: 0.4
      topk: 4
    use_o2m_matcher_on_o2m_aux: false
    loss_fns_find:
      # --- Boxes (L1 + GIoU) ---
      - _target_: sam3.train.loss.loss_fns.Boxes
        weight_dict:
          loss_bbox: 5.0
          loss_giou: 2.0

      # --- Classificação (IABCE estilo DETR) ---
      - _target_: sam3.train.loss.loss_fns.IABCEMdetr
        weak_loss: False
        weight_dict:
          loss_ce: 20.0
          presence_loss: 20.0
        pos_weight: 10.0
        alpha: 0.25
        gamma: 2
        presence_gamma: 2.0   # evita NaN em presence — issue #289
        presence_alpha: 0.5
        use_presence: True
        pos_focal: false
        pad_n_queries: 200
        pad_scale_pos: 1.0

      # --- Máscaras (focal + dice) ---
      - _target_: sam3.train.loss.loss_fns.Masks
        focal_alpha: 0.25
        focal_gamma: 2.0
        weight_dict:
          loss_mask: 200.0
          loss_dice: 10.0
        compute_aux: false

    # --- Semantic segmentation head (muito útil p/ ISIC — 1 classe) ---
    loss_fn_semantic_seg:
      _target_: sam3.train.loss.loss_fns.SemanticSegCriterion
      presence_head: True
      presence_loss: False
      focal: True
      focal_alpha: 0.6
      focal_gamma: 2.0
      downsample: False
      weight_dict:
        loss_semantic_seg: 20.0
        loss_semantic_presence: 1.0
        loss_semantic_dice: 30.0

    scale_by_find_batch_size: ${scratch.scale_by_find_batch_size}

# ============================================================================
# Scratch / helpers
# ============================================================================
scratch:
  enable_segmentation: True

  # Modelo
  d_model: 256
  pos_embed:
    _target_: sam3.model.position_encoding.PositionEmbeddingSine
    num_pos_feats: ${scratch.d_model}
    normalize: true
    scale: null
    temperature: 10000

  # Pós-processamento — uso de presence consistente entre train e eval
  use_presence_eval: True

  original_box_postprocessor:
    _target_: sam3.eval.postprocessors.PostProcessImage
    max_dets_per_img: -1
    use_original_ids: true
    use_original_sizes_box: true
    use_presence: ${scratch.use_presence_eval}

  # Mask postprocessor.
  # FIX para mAP=0:
  # * `use_original_ids: true` — sem isso, o postprocessor seta TODOS os
  #   `category_id` das predições para `1` (postprocessors.py:230-231:
  #   `if forced_labels is None: labels = torch.ones_like(labels)`).
  #   O COCO eval casa por (image_id, category_id); se o GT do ISIC tiver
  #   `category_id != 1` (Roboflow às vezes usa 0), nenhuma predição casa
  #   → 0 mAP em tudo. Com `true`, ele força o label da predição a ser
  #   exatamente o `original_category_id` que veio do JSON do dataset.
  # * `use_original_sizes_box: true` — caixas em pixels da imagem original
  #   (com `false` ficavam em [0,1] e o COCO eval recebia caixas absurdas).
  # * `detection_threshold: 0.0` — pycocotools já ranqueia por score; cortar
  #   antes só atrapalha o recall do AP. (Para inferência clínica, use 0.3–0.5.)
  mask_postprocessor_thresholded:
    _target_: sam3.eval.postprocessors.PostProcessImage
    max_dets_per_img: -1
    iou_type: "segm"
    use_original_ids: true
    use_original_sizes_box: true
    use_original_sizes_mask: true
    convert_mask_to_rle: True
    detection_threshold: 0.0
    use_presence: ${scratch.use_presence_eval}

  # Matcher
  matcher:
    _target_: sam3.train.matcher.BinaryHungarianMatcherV2
    focal: true
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
    alpha: 0.25
    gamma: 2
    stable: False
  scale_by_find_batch_size: True

  # Processamento de imagem
  resolution: 1008
  consistent_transform: False
  # ISIC Task 1: 1 lesão por imagem — um teto de 10 é folgado e correto.
  max_ann_per_img: 10

  # Normalização (SAM3 default: [0.5, 0.5, 0.5])
  train_norm_mean: [0.5, 0.5, 0.5]
  train_norm_std:  [0.5, 0.5, 0.5]
  val_norm_mean:   [0.5, 0.5, 0.5]
  val_norm_std:    [0.5, 0.5, 0.5]

  # Workers / épocas
  num_train_workers: 8   # antes 12 — 8 costuma ser o sweet-spot e deixa folga de CPU
  num_val_workers: 4
  hybrid_repeats: 1
  context_length: 2
  gather_pred_via_filesys: false

  # LR & scheduler — mesmos do roboflow_v100 ref., com budget menor de épocas
  lr_scale: 0.1
  lr_transformer:       ${times:8e-4,${scratch.lr_scale}}
  lr_vision_backbone:   ${times:2.5e-4,${scratch.lr_scale}}
  lr_language_backbone: ${times:5e-5,${scratch.lr_scale}}
  lrd_vision_backbone: 0.9
  wd: 0.1
  # Para max_epochs=40: warmup curto, cooldown longo.
  scheduler_timescale: 10
  scheduler_warmup: 3
  scheduler_cooldown: 15

  # Batch / collate
  val_batch_size: 1
  # IMPORTANTE: `dict_key` da val NUNCA pode ser "all".
  # Em modo eval, o modelo não popula `out["indices"]`
  # (sam3/model/sam3_image.py:488: só calcula matching se training=True
  #  ou num_interactive_steps_val>0). Se a key for "all", o trainer chama
  # a Sam3LossWrapper de verdade, que faz `out["indices"]` e dá
  # KeyError: 'indices'. Usando uma key qualquer != "all", o trainer cai
  # no `loss.default` (DummyLoss=0) e a val computa só os meters.
  # As métricas de COCO continuam funcionando porque `meters.val.isic_val`
  # bate com essa key (ver bloco `meters.val` abaixo).
  collate_fn_val:
    _target_: sam3.train.data.collator.collate_fn_api
    _partial_: true
    repeats: ${scratch.hybrid_repeats}
    dict_key: isic_val
    with_seg_masks: ${scratch.enable_segmentation}

  # Efetivo = train_batch_size * gpus_per_node * gradient_accumulation_steps
  #  2 * 2 * 1 = 4 (cabe em 32 GB no 1008 com AMP bf16 na maioria dos casos)
  # Se der OOM: baixe train_batch_size para 1 e coloque grad_accum 2 ou 4.
  gradient_accumulation_steps: 1
  train_batch_size: 2
  collate_fn:
    _target_: sam3.train.data.collator.collate_fn_api
    _partial_: true
    repeats: ${scratch.hybrid_repeats}
    dict_key: all
    with_seg_masks: ${scratch.enable_segmentation}

# ============================================================================
# Trainer
# ============================================================================
trainer:
  _target_: sam3.train.trainer.Trainer
  skip_saving_ckpts: false
  empty_gpu_mem_cache_after_eval: True
  # Mantemos `skip_first_val: True` para não gastar 1 val em pesos sem treino
  # (a val original também era True). val rodará a cada `val_epoch_freq`
  # épocas. Se quiser baseline pré-treino, mude para False — com o fix
  # do `dict_key` acima a val agora roda sem KeyError.
  skip_first_val: True
  max_epochs: 40          # antes 100 — 2594 imgs convergem bem antes
  accelerator: cuda
  seed_value: 123
  val_epoch_freq: 2       # antes 5 — monitorar mais de perto em poucas épocas
  mode: train
  gradient_accumulation_steps: ${scratch.gradient_accumulation_steps}

  distributed:
    backend: nccl
    find_unused_parameters: True
    gradient_as_bucket_view: True

  loss:
    all: ${roboflow_train.loss}
    default:
      _target_: sam3.train.loss.sam3_loss.DummyLoss

  data:
    train:
      _target_: sam3.train.data.torch_dataset.TorchDataset
      dataset:
        _target_: sam3.train.data.sam3_image_dataset.Sam3ImageDataset
        limit_ids: ${roboflow_train.num_images}
        transforms: ${roboflow_train.train_transforms}
        load_segmentation: ${scratch.enable_segmentation}
        max_ann_per_img: 500000
        multiplier: 1
        max_train_queries: 50000
        max_val_queries: 50000
        training: true
        use_caching: False
        img_folder: ${paths.dataset_path}/train/
        ann_file:   ${paths.dataset_path}/train/_annotations.coco.json

      shuffle: True
      batch_size: ${scratch.train_batch_size}
      num_workers: ${scratch.num_train_workers}
      pin_memory: True
      drop_last: True
      collate_fn: ${scratch.collate_fn}

    val:
      _target_: sam3.train.data.torch_dataset.TorchDataset
      dataset:
        _target_: sam3.train.data.sam3_image_dataset.Sam3ImageDataset
        load_segmentation: ${scratch.enable_segmentation}
        coco_json_loader:
          _target_: sam3.train.data.coco_json_loaders.COCO_FROM_JSON
          # ISIC Task 1: 1 lesão em TODA imagem -> não há "negativos" reais,
          # deixar false mantém o val determinístico e rápido.
          include_negatives: false
          category_chunk_size: 2
          _partial_: true
        img_folder: ${paths.dataset_path}/valid/
        ann_file:   ${paths.dataset_path}/valid/_annotations.coco.json
        transforms: ${roboflow_train.val_transforms}
        max_ann_per_img: 100000
        multiplier: 1
        training: false

      shuffle: False
      batch_size: ${scratch.val_batch_size}
      num_workers: ${scratch.num_val_workers}
      pin_memory: True
      drop_last: False
      collate_fn: ${scratch.collate_fn_val}

  model:
    _target_: sam3.model_builder.build_sam3_image_model
    bpe_path: ${paths.bpe_path}
    device: cpus
    eval_mode: false
    enable_segmentation: ${scratch.enable_segmentation}

  meters:
    val:
      # Esta key TEM que bater com `collate_fn_val.dict_key` definido em
      # `scratch.collate_fn_val.dict_key`. NUNCA usar "all" aqui (vide nota
      # no bloco do collate_fn_val).
      isic_val:
        detection:
          _target_: sam3.eval.coco_writer.PredictionDumper
          iou_type: "segm"
          dump_dir: ${launcher.experiment_log_dir}/dumps
          merge_predictions: True
          postprocessor: ${scratch.mask_postprocessor_thresholded}
          gather_pred_via_filesys: ${scratch.gather_pred_via_filesys}
          maxdets: 100
          pred_file_evaluators:
            - _target_: sam3.eval.coco_eval_offline.CocoEvaluatorOfflineWithPredFileEvaluators
              gt_path: ${paths.dataset_path}/valid/_annotations.coco.json
              tide: False
              iou_type: "bbox"
            - _target_: sam3.eval.coco_eval_offline.CocoEvaluatorOfflineWithPredFileEvaluators
              gt_path: ${paths.dataset_path}/valid/_annotations.coco.json
              tide: False
              iou_type: "segm"

  optim:
    amp:
      # ATENÇÃO:
      # * V100/T4 (sm_70/sm_75) NÃO suportam bfloat16 — o kernel Triton de
      #   sigmoid_focal_loss gera PTX com .bf16 e PTXAS aborta com
      #   "Feature '.bf16' requires .target sm_80 or higher".
      # * Em V100, use float16 + o `presence_gamma: 2.0` que já está na loss
      #   (issue #289) para evitar o NaN do presence_loss.
      # * Se mesmo assim aparecer NaN, coloque enabled: False (mais VRAM).
      # * Em A100/H100/L40/A6000/4090 (sm_80+), troque amp_dtype para bfloat16.
      enabled: True
      amp_dtype: float16

    optimizer:
      _target_: torch.optim.AdamW

    gradient_clip:
      _target_: sam3.train.optim.optimizer.GradientClipper
      max_norm: 0.1
      norm_type: 2

    param_group_modifiers:
      - _target_: sam3.train.optim.optimizer.layer_decay_param_modifier
        _partial_: True
        layer_decay_value: ${scratch.lrd_vision_backbone}
        apply_to: 'backbone.vision_backbone.trunk'
        overrides:
          - pattern: '*pos_embed*'
            value: 1.0

    options:
      lr:
        - scheduler:   # transformer e cabeças
            _target_: sam3.train.optim.schedulers.InverseSquareRootParamScheduler
            base_lr: ${scratch.lr_transformer}
            timescale: ${scratch.scheduler_timescale}
            warmup_steps: ${scratch.scheduler_warmup}
            cooldown_steps: ${scratch.scheduler_cooldown}
        - scheduler:
            _target_: sam3.train.optim.schedulers.InverseSquareRootParamScheduler
            base_lr: ${scratch.lr_vision_backbone}
            timescale: ${scratch.scheduler_timescale}
            warmup_steps: ${scratch.scheduler_warmup}
            cooldown_steps: ${scratch.scheduler_cooldown}
          param_names:
            - 'backbone.vision_backbone.*'
        - scheduler:
            _target_: sam3.train.optim.schedulers.InverseSquareRootParamScheduler
            base_lr: ${scratch.lr_language_backbone}
            timescale: ${scratch.scheduler_timescale}
            warmup_steps: ${scratch.scheduler_warmup}
            cooldown_steps: ${scratch.scheduler_cooldown}
          param_names:
            - 'backbone.language_backbone.*'

      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: ${scratch.wd}
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.0
          param_names:
            - '*bias*'
          module_cls_names: ['torch.nn.LayerNorm']

  checkpoint:
    save_dir: ${launcher.experiment_log_dir}/checkpoints
    save_freq: 10  # antes 5; com max_epochs=40 isso salva ~4 checkpoints

  logging:
    tensorboard_writer:
      _target_: sam3.train.utils.logger.make_tensorboard_logger
      log_dir: ${launcher.experiment_log_dir}/tensorboard
      flush_secs: 120
      should_log: True
    wandb_writer: null
    log_dir: ${launcher.experiment_log_dir}/logs
    log_freq: 10

# ============================================================================
# Launcher
# ============================================================================
launcher:
  num_nodes: 1
  gpus_per_node: 2
  experiment_log_dir: ${paths.experiment_log_dir}
  multiprocessing_context: forkserver

# ============================================================================
# Submitit (necessário para passar o assert do train.py, mesmo sem cluster)
# ============================================================================
submitit:
  account: null
  partition: null
  qos: null
  timeout_hour: 72
  use_cluster: False
  cpus_per_task: 12
  port_range: [10000, 65000]
  constraint: null
  job_array:
    num_tasks: 1
    task_index: 0
